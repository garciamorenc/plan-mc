name: Defrost daily digest

on:
  schedule:
    # 07:00 UTC = 09:00 Madrid en verano (CEST), 08:00 en invierno (CET).
    # Una sola ejecución al día.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      window_hours:
        description: 'Ventana en horas hacia adelante (default 48).'
        required: false
        default: '48'
      force:
        description: 'true para reenviar aunque ya se haya notificado hoy.'
        required: false
        default: 'false'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install firebase-admin
        run: npm install firebase-admin@12 --no-save
      - name: Run notifier
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '48' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: node scripts/notify.mjs
