name: Defrost daily digest

on:
  schedule:
    # 20:00 Madrid → 18:00 UTC en verano (CEST) y 19:00 UTC en invierno (CET).
    # Disparamos ambas y el script ignora la que no toque mediante HOUR_GUARD.
    - cron: '0 18 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      window_hours:
        description: 'Ventana en horas hacia adelante (default 48).'
        required: false
        default: '48'
      force:
        description: 'true para reenviar aunque ya se haya notificado hoy.'
        required: false
        default: 'false'
      skip_hour_guard:
        description: 'true para saltarse el control de hora 20:00 Madrid (manual).'
        required: false
        default: 'true'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install firebase-admin
        run: npm install firebase-admin@12 --no-save
      - name: Run notifier
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '48' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          # En ejecución manual respetamos el input. En cron forzamos guard=false (chequeo activo).
          SKIP_HOUR_GUARD: ${{ github.event.inputs.skip_hour_guard || 'false' }}
          TARGET_HOUR_MADRID: '20'
        run: node scripts/notify.mjs
