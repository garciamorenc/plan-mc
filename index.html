<style>
  :root{
    --bg:#F7F4EF; --ink:#2A2622; --muted:#8A8178; --line:#E7E0D6;
    --card:#FFFFFF; --shadow:0 1px 2px rgba(42,38,34,.04), 0 6px 18px rgba(42,38,34,.06);
    --maria:#CC2E78; --maria-soft:#FBE6F0;
    --carlos:#2D62D4; --carlos-soft:#E4EBFB;
    --display:'Fraunces',Georgia,serif;
    --body:'Inter',-apple-system,system-ui,sans-serif;
    --mono:'DM Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--body); background:var(--bg); color:var(--ink);
    line-height:1.45; -webkit-font-smoothing:antialiased; padding-bottom:48px;
  }
  .wrap{max-width:480px; margin:0 auto;}

  header{
    position:sticky; top:0; z-index:10; background:var(--bg);
    border-bottom:1px solid var(--line); padding:14px 18px 12px;
  }
  .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); font-weight:600;}
  .dayname{font-family:var(--display); font-weight:600; font-size:30px; line-height:1.05; margin:1px 0 12px; letter-spacing:-.01em;}
  .dayname small{font-family:var(--body); font-size:13px; font-weight:500; color:var(--muted); letter-spacing:0;}

  .chips{display:flex; gap:7px;}
  .chip{
    flex:1; border:1px solid var(--line); background:var(--card); color:var(--ink);
    font-family:var(--body); font-weight:600; font-size:14px; padding:9px 0; border-radius:11px;
    cursor:pointer; transition:all .15s ease; -webkit-tap-highlight-color:transparent;
  }
  .chip.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  .controls{display:flex; align-items:center; gap:10px; margin-top:12px;}
  .seg{display:flex; background:#EFE9DF; border-radius:12px; padding:3px; flex:1;}
  .seg button{
    flex:1; border:0; background:transparent; color:var(--muted);
    font-family:var(--body); font-weight:600; font-size:13px; padding:8px 0; border-radius:9px;
    cursor:pointer; transition:all .18s ease; -webkit-tap-highlight-color:transparent;
  }
  .seg button[aria-pressed="true"]{color:#fff; box-shadow:var(--shadow);}
  .seg button.v-conjunta[aria-pressed="true"]{background:var(--ink);}
  .seg button.v-maria[aria-pressed="true"]{background:var(--maria);}
  .seg button.v-carlos[aria-pressed="true"]{background:var(--carlos);}

  .iconbtn{
    border:1px solid var(--line); background:var(--card); color:var(--muted);
    border-radius:11px; width:42px; height:40px; cursor:pointer; font-size:17px;
    display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent;
    transition:all .15s ease; flex:0 0 auto;
  }
  .iconbtn.on{color:var(--ink); border-color:var(--ink); background:#fff;}
  .iconbtn:active{transform:scale(.94);}

  main{padding:16px 14px 0;}

  .card{background:var(--card); border-radius:18px; box-shadow:var(--shadow); padding:15px 16px 6px; margin-bottom:14px; overflow:hidden;}
  .card-head{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:2px;}
  .slot{font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); font-weight:600;}
  .slot .time{color:var(--line); margin-left:7px; letter-spacing:.05em;}
  .progress{font-family:var(--mono); font-size:11.5px; color:var(--muted); white-space:nowrap;}
  .progress.done{color:var(--carlos);}
  .dish{font-family:var(--display); font-weight:600; font-size:19px; line-height:1.15; margin:2px 0 10px; letter-spacing:-.01em;}
  .freemsg{font-size:13.5px; color:var(--muted); font-style:italic; padding:2px 2px 10px;}

  .rows{list-style:none;}
  .row{display:flex; align-items:center; gap:12px; padding:9px 2px; border-top:1px solid #F1ECE3; cursor:pointer; -webkit-tap-highlight-color:transparent;}
  .row:first-child{border-top:0;}
  .box{flex:0 0 auto; width:22px; height:22px; border-radius:7px; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; transition:all .15s ease;}
  .box svg{width:13px; height:13px; opacity:0; transform:scale(.5); transition:all .15s ease;}
  .name{flex:1; font-size:15px; font-weight:500; line-height:1.25;}
  .name .note{display:block; font-size:11.5px; font-weight:500; color:var(--muted); margin-top:1px;}
  .qty{flex:0 0 auto; text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:3px;}
  .total{font-family:var(--mono); font-size:15px; font-weight:500; letter-spacing:-.02em;}
  .total .u{font-family:var(--body); font-size:11px; color:var(--muted); margin-left:2px; font-weight:500;}
  .split{display:flex; gap:5px;}
  .pill{font-family:var(--mono); font-size:10.5px; padding:1px 6px; border-radius:6px; letter-spacing:-.02em; white-space:nowrap;}
  .pill.m{background:var(--maria-soft); color:var(--maria);}
  .pill.c{background:var(--carlos-soft); color:var(--carlos);}
  .solo{font-family:var(--mono); font-size:15px; font-weight:500;}
  .solo.m{color:var(--maria);} .solo.c{color:var(--carlos);}
  .solo .u{font-family:var(--body); font-size:11px; opacity:.7; margin-left:2px;}

  .row.checked .box{background:var(--ink); border-color:var(--ink);}
  .row.checked .box svg{opacity:1; transform:scale(1);}
  .row.checked .name{color:var(--muted); text-decoration:line-through; text-decoration-color:var(--line);}
  .row.checked .qty{opacity:.4;}

  .prep{margin:4px 0 8px;}
  .prep-btn{border:0; background:transparent; color:var(--ink); font-family:var(--body); font-weight:600; font-size:13px; padding:8px 2px; cursor:pointer; display:flex; align-items:center; gap:6px; -webkit-tap-highlight-color:transparent;}
  .prep-btn .arw{transition:transform .2s ease; color:var(--muted);}
  .prep-btn[aria-expanded="true"] .arw{transform:rotate(90deg);}
  .prep-body{display:none; padding:4px 2px 10px;}
  .prep-body.open{display:block;}
  .step{display:flex; gap:9px; padding:5px 0; font-size:13.5px; color:#4a443d; line-height:1.4;}
  .who{flex:0 0 auto; font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:2px 7px; border-radius:6px; height:fit-content; margin-top:1px;}
  .who.maria{background:var(--maria-soft); color:var(--maria);}
  .who.carlos{background:var(--carlos-soft); color:var(--carlos);}
  .who.ambos{background:#EFE9DF; color:var(--muted);}

  .foot{text-align:center; font-size:11.5px; color:var(--muted); padding:14px 24px 0; line-height:1.5;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

     prep:[{who:'ambos',t:'Mezcla la carne con el ajo y el perejil; forma la hamburguesa y hazla a la plancha. Monta con el pan, el huevo a la plancha y el queso.'}],
     items:[{n:'Filete de ternera',m:175,c:175},{n:'Ajo',m:5,c:5},{n:'Perejil',m:5,c:5},
       {n:'Pan de hamburguesa',m:75,c:75,note:'De panadería'},{n:'Huevo',m:50,c:50},{n:'Queso en lonchas light',m:25,c:0}]},
    {slot:'Cena',time:'',free:'Sin cena pautada en el plan.'},
  ]},
  D:{meals:[
    {slot:'Desayuno',time:'09:00',dish:'Tostada de pan integral con jamón y huevo',
     prep:[{who:'ambos',t:'Tuesta el pan integral. Acompaña con el jamón curado, el huevo y el tomate; un hilo de aceite.'},
           {who:'carlos',t:'Con leche y cacao.'}],
     items:[{n:'Pan integral',m:60,c:60},{n:'Jamón curado/serrano',m:40,c:50},{n:'Huevo',m:50,c:50},
       {n:'Tomate',m:70,c:70},{n:'Aceite de oliva',m:5,c:5,u:'ml'},{n:'Bebida de soja 0%',m:150,c:0,u:'ml'},
       {n:'Leche semidesnatada',m:0,c:250,u:'ml'},{n:'Cacao puro 0%',m:0,c:8}]},
    {slot:'Comida',time:'14:00',dish:'Ensalada de sardinas y cottage',
     prep:[{who:'ambos',t:'Mezcla las sardinas con el cottage, los pimientos, el tomate y el maíz. Añade las nueces. Acompaña con las patatas.'}],
     items:[{n:'Sardina',m:90,c:90},{n:'Queso cottage',m:100,c:100},{n:'Pimiento rojo',m:50,c:50},
       {n:'Tomate',m:70,c:70},{n:'Pimiento verde',m:50,c:50},{n:'Maíz',m:30,c:30},{n:'Patatas',m:250,c:250},{n:'Nueces',m:20,c:20}]},
    {slot:'Cena',time:'20:00',dish:'Ensalada crunchy de pasta de lentejas',
     prep:[{who:'ambos',t:'Cuece la pasta de lentejas. Mézclala con el pollo cocinado, el huevo, el tomate cherry y las pipas; aliña con el aceite y la mostaza.'}],
     items:[{n:'Pasta de lentejas',m:50,c:50},{n:'Pechuga de pollo',m:130,c:130},{n:'Huevo',m:50,c:50},
       {n:'Pipas de calabaza',m:10,c:10},{n:'Tomate cherry',m:100,c:100},{n:'Aceite de oliva',m:5,c:5,u:'ml'},{n:'Mostaza de Dijon',m:5,c:5}]},
  ]},
};

const STORE='plan_mc_v1';
const state={day:'L',view:'conjunta',hideHave:false,checked:new Set(),prep:new Set()};

(function(){
  const map=['D','L','M','X','J','V','S'];
  state.day=map[new Date().getDay()]||'L';
  try{
    const s=JSON.parse(localStorage.getItem(STORE)||'{}');
    if(Array.isArray(s.checked)) state.checked=new Set(s.checked);
  }catch(e){}
})();
function save(){
  try{ localStorage.setItem(STORE, JSON.stringify({checked:[...state.checked]})); }catch(e){}
}

const $main=document.getElementById('main');
const $chips=document.getElementById('chips');
const $dayname=document.getElementById('dayname');

function buildChips(){
  $chips.innerHTML='';
  DAYS_ORDER.forEach(d=>{
    const b=document.createElement('button');
    b.className='chip'+(d===state.day?' active':'');
    b.textContent=d; b.setAttribute('aria-label',DAY_NAMES[d]);
    b.onclick=()=>{ state.day=d; state.prep.clear(); save(); render(); };
    $chips.appendChild(b);
  });
}
function visibleItems(meal){
  return (meal.items||[]).filter(it=>{
    if(state.view==='maria') return (it.m||0)>0;
    if(state.view==='carlos') return (it.c||0)>0;
    return true;
  });
}
const key=(mi,ii)=>state.day+'.'+mi+'.'+ii;

function qtyHTML(it){
  const m=it.m||0,c=it.c||0,u=it.u||'g';
  if(state.view==='maria') return `<span class="solo m">${m}<span class="u">${u}</span></span>`;
  if(state.view==='carlos') return `<span class="solo c">${c}<span class="u">${u}</span></span>`;
  if(m>0&&c>0) return `<span class="total">${m+c}<span class="u">${u}</span></span><span class="split"><span class="pill m">M ${m}</span><span class="pill c">C ${c}</span></span>`;
  if(m>0) return `<span class="solo m">${m}<span class="u">${u}</span></span>`;
  return `<span class="solo c">${c}<span class="u">${u}</span></span>`;
}

function render(){
  buildChips();
  $dayname.textContent=DAY_NAMES[state.day];
  document.querySelectorAll('.seg button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.view===state.view));
  const hb=document.getElementById('hideBtn'); hb.classList.toggle('on',state.hideHave); hb.setAttribute('aria-pressed',state.hideHave);

  const day=DATA[state.day];
  let html='';
  day.meals.forEach((meal,mi)=>{
    if(meal.free){
      html+=`<section class="card"><div class="card-head"><div class="slot">${meal.slot}${meal.time?`<span class="time">${meal.time}</span>`:''}</div></div><div class="freemsg">${meal.free}</div></section>`;
      return;
    }
    const items=visibleItems(meal);
    if(items.length===0) return;
    const total=items.length;
    const done=items.filter(it=>state.checked.has(key(mi,meal.items.indexOf(it)))).length;
    const shown=state.hideHave?items.filter(it=>!state.checked.has(key(mi,meal.items.indexOf(it)))):items;

    html+=`<section class="card"><div class="card-head">
      <div class="slot">${meal.slot}${meal.time?`<span class="time">${meal.time}</span>`:''}</div>
      <div class="progress${done===total&&total>0?' done':''}">${done}/${total} listo${total!==1?'s':''}</div></div>`;
    if(meal.dish) html+=`<div class="dish">${meal.dish}</div>`;
    html+=`<ul class="rows">`;
    shown.forEach(it=>{
      const ii=meal.items.indexOf(it),k=key(mi,ii),ck=state.checked.has(k);
      html+=`<li class="row${ck?' checked':''}" data-k="${k}"><span class="box">${CHK}</span>
        <span class="name">${it.n}${it.note?`<span class="note">${it.note}</span>`:''}</span>
        <span class="qty">${qtyHTML(it)}</span></li>`;
    });
    html+=`</ul>`;
    if(meal.prep){
      const steps=meal.prep.filter(s=>state.view==='conjunta'||s.who==='ambos'||s.who===state.view);
      if(steps.length){
        const pk='p'+mi,open=state.prep.has(pk);
        html+=`<div class="prep"><button class="prep-btn" data-pk="${pk}" aria-expanded="${open}"><span class="arw">▸</span> Preparación</button><div class="prep-body${open?' open':''}">`;
        steps.forEach(s=>{
          const lab=s.who==='maria'?'<span class="who maria">María</span>':s.who==='carlos'?'<span class="who carlos">Carlos</span>':'<span class="who ambos">Ambos</span>';
          html+=`<div class="step">${lab}<span>${s.t}</span></div>`;
        });
        html+=`</div></div>`;
      }
    }
    html+=`</section>`;
  });
  $main.innerHTML=html;

  $main.querySelectorAll('.row').forEach(r=>{
    r.onclick=()=>{ const k=r.dataset.k; state.checked.has(k)?state.checked.delete(k):state.checked.add(k); save(); render(); };
  });
  $main.querySelectorAll('.prep-btn').forEach(b=>{
    b.onclick=()=>{ const pk=b.dataset.pk; state.prep.has(pk)?state.prep.delete(pk):state.prep.add(pk); render(); };
  });
}

document.querySelectorAll('.seg button').forEach(b=>{ b.onclick=()=>{ state.view=b.dataset.view; save(); render(); }; });
document.getElementById('hideBtn').onclick=()=>{ state.hideHave=!state.hideHave; render(); };
document.getElementById('resetBtn').onclick=()=>{ const pre=state.day+'.'; [...state.checked].forEach(k=>{ if(k.startsWith(pre)) state.checked.delete(k); }); save(); render(); };

render();
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});}</script>
