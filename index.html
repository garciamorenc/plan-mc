<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F7F4EF">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Plan M&C">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Plan · María & Carlos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F4EF; --ink:#2A2622; --muted:#8A8178; --line:#E7E0D6;
    --card:#FFFFFF; --shadow:0 1px 2px rgba(42,38,34,.04), 0 6px 18px rgba(42,38,34,.06);
    --maria:#CC2E78; --maria-soft:#FBE6F0;
    --carlos:#2D62D4; --carlos-soft:#E4EBFB;
    --ok:#2E8B57; --ok-soft:#E3F2EA;
    --warn:#B5853E; --warn-soft:#F4ECDC;
    --display:'Fraunces',Georgia,serif;
    --body:'Inter',-apple-system,system-ui,sans-serif;
    --mono:'DM Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --tabbar-h: 64px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  [hidden]{display:none!important}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--body); background:var(--bg); color:var(--ink);
    line-height:1.45; -webkit-font-smoothing:antialiased;
    padding-bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px) + 12px);
  }
  .wrap{max-width:480px; margin:0 auto;}

  /* Auth loading + gate */
  #auth-loading{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .spinner{
    width:32px; height:32px; border-radius:50%;
    border:3px solid var(--line); border-top-color:var(--ink);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #auth-gate{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; gap:18px; text-align:center;
  }
  #auth-gate h1{font-family:var(--display); font-size:28px; font-weight:600;}
  #auth-gate p{color:var(--muted); font-size:14px;}
  #sign-in-btn{
    background:var(--ink); color:#fff; border:0; padding:14px 22px; border-radius:12px;
    font-weight:600; font-size:15px; cursor:pointer;
  }
  #sign-in-btn:active{transform:scale(.98);}
  #gate-msg{color:var(--muted); font-size:13px; min-height:1.2em;}

  header{
    position:sticky; top:0; z-index:10; background:var(--bg);
    border-bottom:1px solid var(--line); padding:14px 18px 12px;
  }
  .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); font-weight:600;}
  .dayname{font-family:var(--display); font-weight:600; font-size:30px; line-height:1.05; margin:1px 0 12px; letter-spacing:-.01em;}
  .dayname small{font-family:var(--body); font-size:13px; font-weight:500; color:var(--muted); letter-spacing:0;}

  .chips{display:flex; gap:7px;}
  .chip{
    flex:1; border:1px solid var(--line); background:var(--card); color:var(--ink);
    font-family:var(--body); font-weight:600; font-size:14px; padding:9px 0; border-radius:11px;
    cursor:pointer; transition:all .15s ease; -webkit-tap-highlight-color:transparent;
  }
  .chip.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  .day-swap{display:flex; align-items:center; gap:8px; margin-top:10px; font-size:12px; color:var(--muted);}
  .day-swap-lbl{font-weight:600; text-transform:uppercase; letter-spacing:.1em;}
  .day-swap select{
    flex:1; border:1px solid var(--line); background:var(--card); border-radius:9px;
    padding:6px 8px; font-family:var(--body); font-size:13px; color:var(--ink); font-weight:600;
  }
  .day-swap.on select{border-color:var(--ink); color:var(--ink);}
  .day-swap-reset{
    flex:0 0 auto; border:1px solid var(--line); background:var(--card); color:var(--muted);
    border-radius:9px; width:34px; height:32px; font-size:14px; cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }

  .controls{display:flex; align-items:center; gap:10px; margin-top:12px;}
  .seg{display:flex; background:#EFE9DF; border-radius:12px; padding:3px; flex:1;}
  .seg button{
    flex:1; border:0; background:transparent; color:var(--muted);
    font-family:var(--body); font-weight:600; font-size:13px; padding:8px 0; border-radius:9px;
    cursor:pointer; transition:all .18s ease; -webkit-tap-highlight-color:transparent;
  }
  .seg button[aria-pressed="true"]{color:#fff; box-shadow:var(--shadow);}
  .seg button.v-conjunta[aria-pressed="true"]{background:var(--ink);}
  .seg button.v-maria[aria-pressed="true"]{background:var(--maria);}
  .seg button.v-carlos[aria-pressed="true"]{background:var(--carlos);}

  .iconbtn{
    border:1px solid var(--line); background:var(--card); color:var(--muted);
    border-radius:11px; width:42px; height:40px; cursor:pointer; font-size:17px;
    display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent;
    transition:all .15s ease; flex:0 0 auto;
  }
  .iconbtn.on{color:var(--ink); border-color:var(--ink); background:#fff;}
  .iconbtn:active{transform:scale(.94);}

  .btn-week{
    flex:1; background:var(--ink); color:#fff; border:0; padding:11px 14px; border-radius:11px;
    font-weight:600; font-size:14px; cursor:pointer;
  }
  .btn-secondary{
    flex:1; background:transparent; color:var(--muted); border:1px solid var(--line); padding:10px 14px;
    border-radius:11px; font-weight:600; font-size:13px; cursor:pointer;
  }

  .add-row{gap:6px;}
  .add-row input, .add-row select{
    min-width:0; border:1px solid var(--line); background:var(--card); border-radius:11px;
    padding:10px 12px; font-family:var(--body); font-size:14px; color:var(--ink);
  }
  .add-row #add-name{flex:1;}
  .add-row #add-qty{flex:0 0 54px; padding:10px 8px; text-align:right; -moz-appearance:textfield; appearance:textfield;}
  .add-row #add-qty::-webkit-outer-spin-button, .add-row #add-qty::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  .add-row #add-unit{flex:0 0 56px; padding:10px 6px;}
  .btn-add{
    flex:0 0 auto; background:var(--ink); color:#fff; border:0; border-radius:11px;
    width:42px; height:40px; font-size:20px; font-weight:600; cursor:pointer;
  }

  main{padding:16px 14px 0;}

  .card{background:var(--card); border-radius:18px; box-shadow:var(--shadow); padding:15px 16px 6px; margin-bottom:14px; overflow:hidden;}
  .card.cooked > :not(.meal-actions):not(.card-head){opacity:.55;}
  .card.cooked .card-head .progress::after{content:' · hecha'; color:var(--ok);}
  .card-head{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:2px;}
  .slot{font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); font-weight:600;}
  .slot .time{color:var(--line); margin-left:7px; letter-spacing:.05em;}
  .progress{font-family:var(--mono); font-size:11.5px; color:var(--muted); white-space:nowrap;}
  .progress.done{color:var(--carlos);}
  .dish{font-family:var(--display); font-weight:600; font-size:19px; line-height:1.15; margin:2px 0 10px; letter-spacing:-.01em;}
  .freemsg{font-size:13.5px; color:var(--muted); font-style:italic; padding:2px 2px 10px;}

  .cat-title{font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:7px;}
  .cat-ic{font-size:15px; letter-spacing:0;}

  .rows{list-style:none;}
  .row{display:flex; align-items:center; gap:12px; padding:9px 2px; border-top:1px solid #F1ECE3; cursor:pointer; -webkit-tap-highlight-color:transparent;}
  .row:first-child{border-top:0;}
  .box{flex:0 0 auto; width:22px; height:22px; border-radius:7px; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; transition:all .15s ease;}
  .box.big{width:28px; height:28px; border-radius:9px;}
  .box svg{width:13px; height:13px; opacity:0; transform:scale(.5); transition:all .15s ease;}
  .name{flex:1; font-size:15px; font-weight:500; line-height:1.25; text-align:left;}
  .name .note{display:block; font-size:11.5px; font-weight:500; color:var(--muted); margin-top:1px;}
  .qty{flex:0 0 auto; text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:3px;}
  .total{font-family:var(--mono); font-size:15px; font-weight:500; letter-spacing:-.02em;}
  .total .u{font-family:var(--body); font-size:11px; color:var(--muted); margin-left:2px; font-weight:500;}
  .split{display:flex; gap:5px;}
  .pill{font-family:var(--mono); font-size:10.5px; padding:1px 6px; border-radius:6px; letter-spacing:-.02em; white-space:nowrap;}
  .pill.m{background:var(--maria-soft); color:var(--maria);}
  .pill.c{background:var(--carlos-soft); color:var(--carlos);}
  .solo{font-family:var(--mono); font-size:15px; font-weight:500;}
  .solo.m{color:var(--maria);} .solo.c{color:var(--carlos);}
  .solo .u{font-family:var(--body); font-size:11px; opacity:.7; margin-left:2px;}

  .row.checked .box{background:var(--ink); border-color:var(--ink);}
  .row.checked .box svg{opacity:1; transform:scale(1);}
  .row.checked .name{color:var(--muted); text-decoration:line-through; text-decoration-color:var(--line);}
  .row.checked .qty{opacity:.4;}

  .prep{margin:4px 0 8px;}
  .prep-btn{border:0; background:transparent; color:var(--ink); font-family:var(--body); font-weight:600; font-size:13px; padding:8px 2px; cursor:pointer; display:flex; align-items:center; gap:6px; -webkit-tap-highlight-color:transparent;}
  .prep-btn .arw{transition:transform .2s ease; color:var(--muted);}
  .prep-btn[aria-expanded="true"] .arw{transform:rotate(90deg);}
  .prep-body{display:none; padding:4px 2px 10px;}
  .prep-body.open{display:block;}
  .step{display:flex; gap:9px; padding:5px 0; font-size:13.5px; color:#4a443d; line-height:1.4;}
  .who{flex:0 0 auto; font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:2px 7px; border-radius:6px; height:fit-content; margin-top:1px;}
  .who.maria{background:var(--maria-soft); color:var(--maria);}
  .who.carlos{background:var(--carlos-soft); color:var(--carlos);}
  .who.ambos{background:#EFE9DF; color:var(--muted);}

  .meal-actions{padding:6px 0 12px; display:flex; gap:8px;}
  .btn-done, .btn-undo{
    flex:1; border:1px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:11px; padding:10px; font-weight:600; font-size:13px; cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-done{background:var(--ok-soft); color:var(--ok); border-color:var(--ok-soft);}
  .btn-done:active{transform:scale(.98);}
  .btn-undo{color:var(--muted);}

  .pantry-row{cursor:default; height:52px; padding:0 2px 0 8px; border-left:3px solid transparent;}
  .pantry-row.empty{border-left-color:var(--warn);}
  .pantry-row.empty input.qval{color:var(--warn); border-color:var(--warn-soft);}
  .pantry-ctrls{display:flex; align-items:center; gap:6px;}
  .qbtn{
    width:32px; height:32px; border-radius:9px; border:1px solid var(--line); background:var(--card);
    font-size:18px; font-weight:600; color:var(--ink); cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .qbtn:active{transform:scale(.94);}
  .qbtn.trash{color:#B7472A; font-size:14px; margin-left:2px;}
  input.qval{
    font-family:var(--mono); font-size:15px; width:56px; text-align:right;
    padding:6px 6px; border:1px solid var(--line); background:var(--card); border-radius:8px;
    color:var(--ink); -moz-appearance:textfield; appearance:textfield;
  }
  input.qval::-webkit-outer-spin-button, input.qval::-webkit-inner-spin-button{
    -webkit-appearance:none; margin:0;
  }
  input.qval:focus{outline:none; border-color:var(--ink);}
  .qunit{font-family:var(--body); font-size:11px; color:var(--muted); min-width:14px;}

  .ajustes-help{font-size:13px; color:var(--muted); line-height:1.45; padding:2px 2px 12px;}
  .seg-ajustes{margin:0 0 12px;}
  .meal-partial{font-size:11.5px; color:var(--muted); padding:6px 4px; font-style:italic;}
  .plan-day{padding:12px 2px; border-top:1px solid #F1ECE3;}
  .plan-day:first-of-type{border-top:0;}
  .plan-day-head{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px;}
  .plan-day-name{font-family:var(--display); font-weight:600; font-size:17px; color:var(--ink);}
  .plan-day-name small{font-family:var(--body); font-weight:500; color:var(--muted); font-size:11.5px; margin-left:4px;}
  .plan-day-toggle{
    flex:0 0 auto; width:42px; height:24px; border-radius:12px; border:0;
    background:var(--line); padding:0; position:relative; cursor:pointer;
    -webkit-tap-highlight-color:transparent; transition:background .18s ease;
  }
  .plan-day-toggle::before{
    content:''; position:absolute; top:3px; left:3px;
    width:18px; height:18px; border-radius:50%; background:#fff;
    box-shadow:0 1px 3px rgba(42,38,34,.18);
    transition:transform .18s ease;
  }
  .plan-day-toggle[aria-checked="true"]{background:var(--ink);}
  .plan-day-toggle[aria-checked="true"]::before{transform:translateX(18px);}
  .plan-day-toggle:active::before{transform:scale(.94);}
  .plan-day-toggle[aria-checked="true"]:active::before{transform:translateX(18px) scale(.94);}

  .plan-person-row{display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:nowrap;}
  .plan-person-lbl{
    flex:0 0 auto; font-size:11px; font-weight:700; letter-spacing:.05em;
    text-transform:uppercase; padding:5px 8px; border-radius:7px; min-width:52px; text-align:center;
  }
  .plan-person-row.m .plan-person-lbl{background:var(--maria-soft); color:var(--maria);}
  .plan-person-row.c .plan-person-lbl{background:var(--carlos-soft); color:var(--carlos);}

  .plan-meals{display:flex; flex-wrap:wrap; gap:6px; flex:1;}
  .plan-meal{
    border-radius:9px; padding:7px 11px; font-family:var(--body); font-size:12.5px; font-weight:600;
    cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all .15s ease;
    min-width:48px; text-align:center; border:1px solid transparent;
  }
  .plan-meal.m{background:var(--maria); border-color:var(--maria); color:#fff;}
  .plan-meal.m[aria-pressed="false"]{background:var(--card); color:var(--maria); border-color:var(--maria-soft); text-decoration:line-through;}
  .plan-meal.c{background:var(--carlos); border-color:var(--carlos); color:#fff;}
  .plan-meal.c[aria-pressed="false"]{background:var(--card); color:var(--carlos); border-color:var(--carlos-soft); text-decoration:line-through;}
  .plan-meal.empty-portion{background:var(--card); color:var(--muted); border-color:var(--line); opacity:.45; pointer-events:none; text-decoration:none;}
  .plan-meal:active{transform:scale(.96);}
  .ajustes-actions{padding:6px 0 12px;}
  .archive-row{cursor:default; padding:10px 2px; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;}
  .archive-row.active-row{background:linear-gradient(90deg, rgba(45,98,212,.05), transparent); padding-left:10px; border-radius:9px; border-left:3px solid var(--ink);}
  .archive-meta{display:flex; flex-direction:column; gap:2px; flex:1; min-width:140px;}
  .archive-meta .name{font-size:14px; font-weight:600;}
  .archive-date{font-size:11.5px; color:var(--muted); font-family:var(--mono);}
  .active-badge{
    display:inline-block; background:var(--ink); color:#fff;
    font-family:var(--body); font-size:9.5px; letter-spacing:.1em; font-weight:700;
    padding:2px 6px; border-radius:5px; margin-left:6px; vertical-align:middle;
  }
  .archive-ctrls{display:flex; gap:6px; align-items:center; flex:0 0 auto;}
  .archive-row .ed-btn-sec, .archive-row .ed-btn-pri{padding:7px 11px; font-size:12.5px;}
  .swap-row{justify-content:space-between;}
  .swap-ctrls{display:flex; align-items:center; gap:8px; flex:0 0 auto;}
  .swap-sel{
    border:1px solid var(--line); background:var(--card); border-radius:9px;
    padding:6px 8px; font-family:var(--body); font-size:13px; color:var(--ink); font-weight:600;
    min-width:115px;
  }
  .swap-reset{font-size:14px;}
  .signout-foot{text-align:center; padding:12px 0 18px;}
  .signout-foot button{
    background:transparent; border:0; color:var(--muted); font-family:var(--body);
    font-size:12px; padding:6px 10px; cursor:pointer; text-decoration:underline;
    text-underline-offset:3px; -webkit-tap-highlight-color:transparent;
  }
  .empty-state{text-align:center; padding:48px 24px; color:var(--ink); font-family:var(--display); font-size:20px;}
  .empty-state small{display:block; margin-top:8px; font-family:var(--body); font-size:13px; color:var(--muted); font-weight:500;}
  .loading{text-align:center; padding:48px 24px; color:var(--muted); font-size:14px;}

  /* Bottom tab bar */
  .tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:20;
    background:rgba(247,244,239,.92); backdrop-filter:saturate(1.5) blur(8px);
    border-top:1px solid var(--line);
    padding: 6px 12px calc(6px + env(safe-area-inset-bottom, 0px));
    display:flex; justify-content:center; gap:6px;
  }
  .tabbar .inner{max-width:480px; width:100%; display:flex; gap:6px;}
  .tabbar button{
    flex:1; border:0; background:transparent; color:var(--muted);
    font-family:var(--body); font-weight:600; font-size:12px; padding:8px 4px; border-radius:10px;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .tabbar button .ic{width:22px; height:22px; display:block;}
  .tabbar button[aria-pressed="true"]{color:var(--ink); background:var(--card); box-shadow:var(--shadow);}

  /* ----- Editor del plan ----- */
  #editor{
    position:fixed; inset:0; z-index:30; background:var(--bg); overflow-y:auto;
    padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  }
  .editor-header{
    position:sticky; top:0; z-index:5; background:var(--bg);
    display:flex; align-items:center; gap:10px;
    padding:12px 14px; border-bottom:1px solid var(--line);
  }
  .editor-header h2{flex:1; text-align:center; font-family:var(--display); font-weight:600; font-size:17px; letter-spacing:-.01em;}
  .ed-btn-pri{
    background:var(--ink); color:#fff; border:0; padding:10px 16px; border-radius:11px;
    font-family:var(--body); font-weight:600; font-size:13px; cursor:pointer;
  }
  .ed-btn-pri.dirty{background:var(--maria);}
  .ed-btn-pri:disabled{opacity:.5;}
  .ed-btn-sec{
    background:transparent; color:var(--muted); border:1px solid var(--line);
    padding:9px 14px; border-radius:11px; font-family:var(--body); font-weight:600; font-size:13px; cursor:pointer;
  }
  #ed-chips{padding:14px 14px 4px; display:flex; flex-direction:column; gap:10px;}
  #ed-name{
    width:100%; border:1px solid var(--line); background:var(--card); border-radius:11px;
    padding:10px 12px; font-family:var(--display); font-weight:600; font-size:18px; color:var(--ink);
  }
  .ed-chips-row{display:flex; gap:7px;}
  #ed-main{padding:8px 14px 24px;}

  .ed-meal{
    background:var(--card); border-radius:18px; box-shadow:var(--shadow);
    padding:14px 14px 10px; margin-bottom:14px;
  }
  .ed-meal-head{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
  .ed-meal-slot{flex:1; border:1px solid var(--line); background:var(--bg); border-radius:9px; padding:7px 10px;
    font-family:var(--body); font-weight:600; font-size:13.5px; color:var(--ink);}
  .ed-meal-time{flex:0 0 78px; border:1px solid var(--line); background:var(--bg); border-radius:9px; padding:7px 10px;
    font-family:var(--mono); font-size:13px; color:var(--ink); text-align:center;}
  .ed-trash{
    flex:0 0 auto; background:transparent; border:1px solid var(--line); border-radius:9px;
    width:34px; height:34px; cursor:pointer; color:#B7472A; font-size:14px;
    -webkit-tap-highlight-color:transparent;
  }
  .ed-meal-dish{
    width:100%; border:1px solid var(--line); background:var(--bg); border-radius:9px; padding:8px 10px;
    font-family:var(--display); font-weight:600; font-size:16px; color:var(--ink); margin-bottom:10px;
  }

  .ed-free-row{display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:13px; color:var(--muted);}
  .ed-free-row input[type="checkbox"]{width:18px; height:18px; cursor:pointer;}
  .ed-free-msg{
    width:100%; border:1px solid var(--line); background:var(--bg); border-radius:9px; padding:8px 10px;
    font-family:var(--body); font-style:italic; font-size:13.5px; color:var(--muted); margin-bottom:8px;
  }

  .ed-section-title{
    font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); font-weight:700;
    margin:10px 0 6px;
  }
  .ed-items, .ed-prep{list-style:none; padding:0; margin:0 0 6px;}
  .ed-item, .ed-prep-step{
    background:var(--bg); border:1px solid var(--line); border-radius:11px;
    padding:9px 10px; margin-bottom:6px;
  }
  .ed-item-name{
    width:100%; border:0; background:transparent; padding:2px 0 6px;
    font-family:var(--body); font-weight:600; font-size:14px; color:var(--ink);
  }
  .ed-item-row{display:flex; align-items:center; gap:6px;}
  .ed-q{
    flex:0 0 56px; width:56px; border:1px solid var(--line); background:var(--card); border-radius:8px;
    padding:5px 6px; font-family:var(--mono); font-size:13px; text-align:right;
    -moz-appearance:textfield; appearance:textfield;
  }
  .ed-q::-webkit-outer-spin-button, .ed-q::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  .ed-q-lbl{font-family:var(--body); font-size:10.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;}
  .ed-q-lbl.m{color:var(--maria);} .ed-q-lbl.c{color:var(--carlos);}
  .ed-unit{
    flex:0 0 56px; border:1px solid var(--line); background:var(--card); border-radius:8px;
    padding:5px 4px; font-family:var(--body); font-size:13px;
  }
  .ed-item-note{
    width:100%; border:0; background:transparent; padding:4px 0 0;
    font-family:var(--body); font-size:11.5px; color:var(--muted); font-style:italic;
  }
  .ed-item-note::placeholder, .ed-item-name::placeholder, .ed-step-text::placeholder{color:#C4BBA9;}

  .ed-prep-step{display:flex; align-items:flex-start; gap:8px;}
  .ed-step-who{
    flex:0 0 80px; border:1px solid var(--line); background:var(--card); border-radius:8px;
    padding:5px 6px; font-family:var(--body); font-size:12px;
  }
  .ed-step-text{
    flex:1; border:0; background:transparent; padding:4px 0; resize:vertical; min-height:36px;
    font-family:var(--body); font-size:13px; color:#4a443d; line-height:1.4;
  }

  .ed-add-btn{
    width:100%; border:1px dashed var(--line); background:transparent; color:var(--muted);
    border-radius:11px; padding:9px; font-family:var(--body); font-weight:600; font-size:12.5px;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .ed-add-btn:active{transform:scale(.99);}

  .ed-add-meal{margin-top:6px;}
  .ed-cat-row{display:flex; gap:8px; align-items:center; padding:8px 0; border-top:1px solid #F1ECE3;}
  .ed-cat-row:first-of-type{border-top:0;}
  .ed-cat-row .ed-cat-name{flex:1; font-size:14px; font-weight:500;}
  .ed-cat-row select{
    flex:0 0 auto; border:1px solid var(--line); background:var(--card); border-radius:9px;
    padding:6px 8px; font-family:var(--body); font-size:13px; min-width:160px;
  }

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

  </nav>
  <button id="sign-out-btn" hidden></button>
</div>

<div id="editor" hidden>

    <button id="ed-cancel" class="ed-btn-sec">Cancelar</button>
    <h2>Editar plan</h2>
    <button id="ed-save" class="ed-btn-pri">Guardar</button>
  </header>
  <div id="ed-chips" class="chips wrap"></div>
  <main id="ed-main" class="wrap"></main>
